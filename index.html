<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cow Tank</title>
<style>
body{font-family:Arial;padding:20px;background:#f4f6f8}
.box{background:white;padding:15px;margin-bottom:15px;border-radius:10px}
button{padding:6px 10px;margin:3px;border:none;border-radius:6px;color:white}
.plus{background:#2d7ff9}
.minus{background:#e74c3c}
</style>
</head>

<body>

<h2>🐂 Cow Tank</h2>

<div class="box">
<h3>LN2-01</h3>

<p>
Delta Lambda 🔴 <br>
<span id="a">18</span> หลอด
</p>
<button class="plus" onclick="add('a')">+</button>
<button class="minus" onclick="minus('a')">-</button>
</div>

<div class="box">
<h3>LN2-02</h3>

<p>
Chief 🔵 <br>
<span id="b">12</span> หลอด
</p>
<button class="plus" onclick="add('b')">+</button>
<button class="minus" onclick="minus('b')">-</button>
</div>

<div class="box">
<h3>LN2-03</h3>

<p>
Dropbox 🟢 <br>
<span id="c">6</span> หลอด
</p>
<button class="plus" onclick="add('c')">+</button>
<button class="minus" onclick="minus('c')">-</button>
</div>

<script>
function add(id){
  let el=document.getElementById(id);
  el.innerText=parseInt(el.innerText)+1;
}

function minus(id){
  let el=document.getElementById(id);
  let v=parseInt(el.innerText);
  if(v>0){
    el.innerText=v-1;
  }
}
</script>

</body>
</html>
