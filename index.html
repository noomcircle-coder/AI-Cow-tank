<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cow Tank</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f6f8;
    }

    .tank {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }

    button {
      padding: 6px 12px;
      margin: 2px;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
    }

    .plus {
      background: #2d7ff9;
    }

    .minus {
      background: #e74c3c;
    }

    h2 {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<h2>🐂 Cow Tank System</h2>

<div class="tank">
  <h3>LN2-01</h3>

  <div class="row">
    <div>
      A - Delta Lambda 🔴 <br>
      <span id="a">18</span> หลอด
    </div>
    <div>
      <button class="plus" onclick="add('a')">+</button>
      <button class="minus" onclick="minus('a')">-</button>
    </div>
  </div>

  <hr>

  <div class="row">
    <div>
      B - Chief 🔵 <br>
      <span id="b">12</span> หลอด
    </div>
    <div>
      <button class="plus" onclick="add('b')">+</button>
      <button class="minus" onclick="minus('b')">-</button>
    </div>
  </div>

  <hr>

  <div class="row">
    <div>
      C - Dropbox 🟢 <br>
      <span id="c">6</span> หลอด
    </div>
    <div>
      <button class="plus" onclick="add('c')">+</button>
      <button class="minus" onclick="minus('c')">-</button>
    </div>
  </div>

</div>

<script>
function add(id) {
  let el = document.getElementById(id);
  el.innerText = parseInt(el.innerText) + 1;
}

function minus(id) {
  let el = document.getElementById(id);
  let val = parseInt(el.innerText);
  if (val > 0) {
    el.innerText = val - 1;
  }
}
</script>

</body>
</html>
