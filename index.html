<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cow Farm System</title>
<style>
body{font-family:Arial;background:#f4f6f8;padding:20px}
.tank{background:white;padding:15px;border-radius:10px;margin-bottom:20px}
.rack{background:#f9f9f9;padding:10px;margin:10px 0;border-radius:8px}
.bull{margin:5px 0;padding:8px;background:#fff;border-radius:6px}
button{padding:5px 8px;margin:2px;border:none;border-radius:5px;color:white}
.plus{background:#2d7ff9}
.minus{background:#e74c3c}
.low{color:red;font-weight:bold}
</style>
</head>

<body>

<h2>🐂 Cow Farm System</h2>

<div id="app"></div>

<script>

let data = JSON.parse(localStorage.getItem("cowfarm") || "null");

if(!data){
  data = {
    tanks:[
      {
        name:"Tank 1",
        racks:[
          {
            name:"Rack 1",
            bulls:[
              {name:"Bull A", color:"🔴", qty:5},
              {name:"Bull B", color:"🔵", qty:2},
              {name:"Bull C", color:"🟢", qty:10}
            ]
          }
        ]
      }
    ]
  };
}

function save(){
  localStorage.setItem("cowfarm", JSON.stringify(data));
}

function render(){
  let html = "";

  data.tanks.forEach((t,ti)=>{
    html += `<div class="tank"><h3>${t.name}</h3>`;

    t.racks.forEach((r,ri)=>{
      html += `<div class="rack"><b>${r.name}</b>`;

      r.bulls.forEach((b,bi)=>{

        let warn = b.qty < 3 ? "low" : "";

        html += `
        <div class="bull">
          ${b.color} ${b.name} 
          <span class="${warn}">(${b.qty})</span>

          <button class="plus" onclick="change(${ti},${ri},${bi},1)">+</button>
          <button class="minus" onclick="change(${ti},${ri},${bi},-1)">-</button>
        </div>
        `;
      });

      html += `</div>`;
    });

    html += `</div>`;
  });

  document.getElementById("app").innerHTML = html;
  save();
}

function change(ti,ri,bi,val){
  let b = data.tanks[ti].racks[ri].bulls[bi];
  b.qty += val;
  if(b.qty < 0) b.qty = 0;
  render();
}

render();

</script>

</body>
</html>
